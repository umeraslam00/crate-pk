<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crate.pk — Coming Soon</title>

    <meta name="description" content="Crate.pk is launching soon. Stay tuned for something exciting.">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Inter, Arial, sans-serif;
            background: #0f172a;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 700px;
        }

        .logo {
            font-size: 4rem;
            font-weight: 800;
            margin-bottom: 20px;
            letter-spacing: -2px;
        }

        .tagline {
            font-size: 1.4rem;
            color: #cbd5e1;
            margin-bottom: 20px;
        }

        .description {
            color: #94a3b8;
            line-height: 1.8;
            margin-bottom: 40px;
        }

        .badge {
            display: inline-block;
            background: #1e293b;
            border: 1px solid #334155;
            padding: 10px 18px;
            border-radius: 999px;
            margin-bottom: 30px;
            color: #38bdf8;
            font-weight: 600;
        }

        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            text-decoration: none;
            padding: 14px 24px;
            border-radius: 10px;
            font-weight: 600;
            transition: 0.2s ease;
        }

        .primary {
            background: #2563eb;
            color: white;
        }

        .primary:hover {
            background: #1d4ed8;
        }

        .secondary {
            border: 1px solid #334155;
            color: white;
        }

        .secondary:hover {
            background: #1e293b;
        }

        footer {
            margin-top: 50px;
            color: #64748b;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="badge">
        Launching Soon 🚀
    </div>

    <div class="logo">
        Crate.pk
    </div>

    <div class="tagline">
        Pakistan's next destination for great products.
    </div>

    <div class="description">
        We're building something exciting. Stay tuned as we prepare to launch
        a better online shopping experience.
    </div>

    <div class="buttons">
        <a class="btn primary" href="mailto:hello@crate.pk">
            Contact Us
        </a>

        <a class="btn secondary" href="https://wa.me/923001234567">
            WhatsApp
        </a>
    </div>

    <footer>
        © 2026 Crate.pk. All rights reserved.
    </footer>

</div>

</body>
</html>
